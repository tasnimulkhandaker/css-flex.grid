    <title>flex layout</title>

    <style>

        .container{
            display: flex;
            justify-content: space-around;
            /* gap: 20px; */

        }
         .box{
            border: 1px solid blue ;
            
            height: 100px;
            font-size: 2rem;
            
            
        }
        div{font: size 2rem;}
        .user-container{

            height: 100px;
        }

        .pic-container{

            justify-content: center;
            align-items: center;
            height: 500px;
        }
         .picture-1{
           border: 3px solid purple;

            height: 200px;
            width : 200px;
         }
    </style>
</head>
